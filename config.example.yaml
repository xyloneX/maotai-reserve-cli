# 复制为 config.yaml 后修改

# 本地加密密钥（任意字符串，用于加密保存的 token）
secret_key: "请改成你自己的随机字符串"

# 高德地图 Key（登录时解析地址用）https://lbs.amap.com/
amap_key: ""

# 预约商品 ID（可在 i茅台 App 商品页抓包或查开源项目更新）
# 常见：10941 飞天500ml | 10942 飞天100ml 等，以 App 当前为准
items:
  - code: "10941"
    name: "飞天茅台500ml"
  - code: "10942"
    name: "飞天茅台100ml"

# 门店策略（参考网易攻略 + ken-iMoutai-Script）:
#   max_inventory    = 本市/省内库存最大（默认，开源 INVENTORY）
#   min_competition  = 可预约门店中库存偏小（避开最热门店，网易攻略）
#   nearest          = 距离最近（开源 NEAREST）
# 账号可在 credentials 里单独设 shop_id / shop_strategy 覆盖
shop_strategy: max_inventory

# 选店范围: city=仅本市 | province=全省门店
shop_scope: city

# 指定门店不可用或报错时，是否自动换店（ken 脚本同类逻辑）
shop_fallback: true

# 多账号依次预约间隔（秒），降低同 IP 瞬时并发，建议 0.3~2
account_stagger_seconds: 0.5

# 换出口组时额外等待（秒），避免多组共用一个代理时打满
egress_group_stagger_seconds: 3

# ---------- IP 隔离（1000 号必读 docs/IP隔离部署指南.md）----------
# 出口组名 → 代理 URL；账号 credentials 里写 egress_group: ip001
# 1000 号建议每 20 号一组 → 约 50 个代理/50 个热点
# proxy_pools:
#   ip001: "http://user:pass@1.2.3.4:8080"
#   ip002: "socks5://user:pass@5.6.7.8:1080"
proxy_pools: {}

# 分配脚本建议每组人数: python scripts/assign_egress_groups.py --per-group 20
max_accounts_per_egress: 20

# ---------- 大规模预约（几百～1000 号）----------
# 按 egress_group 并行：不同出口组同时跑，组内仍串行（同代理不打满）
reserve:
  parallel_by_egress: true
  max_workers: 32
  # 定时预约账号数超过此值时拆成多个子任务，错开 3 秒启动
  shard_size: 50

# 是否在预约前领取小茅运/耐力（账号活跃度，需 App 内配合签到）
claim_energy: true

# ---------- 风控 / 反检测（详见 docs/风控系统说明.md）----------
antidetect:
  enabled: true
  # 每账号固定 UA+MT-Info（由 device_id 推导，登录后写入 credentials）
  stable_fingerprint: true
  random_ua: true
  random_network_type: true
  random_mt_info: false
  warmup_before_reserve: true
  claim_energy_probability: 0.3
  jitter_seconds: 3.0
  # 每次 API 前随机停顿（秒），模拟真人节奏
  request_delay_min: 0.12
  request_delay_max: 0.38
  # 同一手机号两次发码最短间隔（秒）
  login_vcode_interval: 90
  # 预约/发码遇 429 后账号冷却（秒）
  reserve_429_cooldown: 90
  # 单账号每分钟最多预约请求次数
  max_reserve_per_minute: 6

# 定时：每天在此时间前 N 秒发起预约（申购窗口约 9:00-10:00）
schedule:
  target_time: "09:00:00"
  advance_seconds: 2
  # 提前 N 分钟预拉门店/session（减轻 9:00 整点压力）
  prewarm_minutes: 5
  # 捡漏波次：9:05/9:10/9:15 重试未成功项（网易攻略「五分钟节点」）
  wave_times:
    - "09:05:00"
    - "09:10:00"
    - "09:15:00"
  wave_retry_failed_only: true
  run_immediately_if_missed: false

# 交互 CLI: python cli.py
# 试跑: python main.py --dry-run  或  python cli.py dry-run
# 自检: python check.py  或  python cli.py check

# 场次 sessionId 等待（非 9 点可能为 0，程序会轮询）
session:
  wait_seconds: 120
  poll_interval_seconds: 5

# 失败重试（单轮内）
retry:
  count: 3
  interval_seconds: 0.5

# PushPlus 微信推送 https://www.pushplus.plus
pushplus_token: ""
